# 🎙️ CosyVoice · CI/CD Pipeline
# Runner: kunpeng-burner (Group: seekkey)
# 策略：TTS 模型验证 + 环境部署

variables:
  GIT_STRATEGY: clone

stages:
  - verify
  - deploy

# =========================================
# 1. 验证环境
# =========================================
verify-env:
  stage: verify
  tags: [burn]
  script:
    - echo "🔍 验证 CosyVoice 环境..."
    - cd ~/cosyvoice
    - python3 -c "import torch; print(f'Torch: {torch.__version__}, CUDA: {torch.cuda.is_available()}')"
    - echo "✅ 环境就绪"
  only:
    - main

# =========================================
# 2. 部署（拉取最新代码 + 打补丁）
# =========================================
deploy:
  stage: deploy
  tags: [burn]
  script:
    - echo "📦 部署 CosyVoice..."
    - cd ~/cosyvoice
    - git fetch origin main
    - git checkout main
    - git reset --hard origin/main
    - echo "✅ CosyVoice 已更新 (commit: $(git log --oneline -1))"
  only:
    - main
